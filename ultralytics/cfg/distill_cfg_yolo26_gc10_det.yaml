# Knowledge Distillation config for GC10-DET (yolo26m teacher)
# 기존 distill_cfg_yolo26.yaml과 동일한 layer 정렬 위치(Detect head cv2/cv3 2nd conv).
# Teacher는 GC10-DET에 200 epoch fine-tuned된 yolo26m baseline best.pt 사용.

teacher:
  model: runs/detect/gc10_det/train/baseline_yolo26m_gc10_det_200epoch/weights/best.pt
  layers:
    - "model.23.cv2.0.1"   # box branch scale0 2nd conv
    - "model.23.cv2.1.1"   # box branch scale1 2nd conv
    - "model.23.cv2.2.1"   # box branch scale2 2nd conv
    - "model.23.cv3.0.1"   # cls branch scale0 2nd conv
    - "model.23.cv3.1.1"   # cls branch scale1 2nd conv
    - "model.23.cv3.2.1"   # cls branch scale2 2nd conv

student:
  layers:
    - "model.23.cv2.0.1"
    - "model.23.cv2.1.1"
    - "model.23.cv2.2.1"
    - "model.23.cv3.0.1"
    - "model.23.cv3.1.1"
    - "model.23.cv3.2.1"

aligner: ConvBNSiLUAligner
loss: mse
weight: 1.0
